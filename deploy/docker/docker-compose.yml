# ARGUS — local/dev full stack.  up:  docker compose -f deploy/docker/docker-compose.yml up
# Phase-1 needs only `api`. postgres/neo4j/redis/kafka are Phase-2 dependencies.
name: argus
services:
  api:
    build: { context: ../.., dockerfile: deploy/docker/Dockerfile.api }
    ports: ["8000:8000"]
    environment:
      ARGUS_FAST: "1"
      ARGUS_DB: /data/copilot.db          # swap to DATABASE_URL for postgres driver (Phase 2)
      # ARGUS_LLM_URL: http://vllm:8000/v1   # Task 76: OpenAI-compatible NLU assist (preferred)
      # OLLAMA_URL: http://ollama:11434      # alternative NLU assist backend
    volumes: [argus-data:/data]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["phase2"]
    environment: { POSTGRES_DB: argus, POSTGRES_USER: argus, POSTGRES_PASSWORD: argus-dev-only }
    ports: ["5432:5432"]
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../../db/postgres:/docker-entrypoint-initdb.d:ro   # auto-applies 001_init.sql on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 5s
      timeout: 3s
      retries: 12

  neo4j:
    image: neo4j:5
    profiles: ["phase2"]
    environment: { NEO4J_AUTH: neo4j/argus-dev-only }
    ports: ["7474:7474", "7687:7687"]
    volumes: [neo4j-data:/data]
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p argus-dev-only 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 40s

  redis:
    image: redis:7-alpine
    profiles: ["phase2"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  kafka:
    image: bitnami/kafka:3.7
    profiles: ["phase2"]
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092          # in-network clients (workers)
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"                    # topics via db/kafka/topics.yaml only
    ports: ["9092:9092"]
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 8s
      retries: 18
      start_period: 30s

  frontend:                       # Task 58: React build served by nginx, /v1 proxied to api
    build: { context: ../.., dockerfile: deploy/docker/Dockerfile.frontend }
    profiles: ["frontend"]
    ports: ["8080:80"]
    depends_on: [api]
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    profiles: ["llm"]
    ports: ["11434:11434"]
    volumes: [ollama-data:/root/.ollama]

  vllm:                           # Task 76: OpenAI-compatible LLM server (NLU assist)
    image: vllm/vllm-openai:v0.6.3                         # image pinned
    profiles: ["llm"]
    command: ["--model", "Qwen/Qwen2.5-1.5B-Instruct",
              "--revision", "PIN_ME_TO_A_COMMIT_SHA",      # model revision pinned in prod
              "--served-model-name", "Qwen2.5-1.5B-Instruct",
              "--max-model-len", "4096", "--max-num-seqs", "64"]
    environment: { HUGGING_FACE_HUB_TOKEN: "${HUGGING_FACE_HUB_TOKEN:-}" }
    ports: ["8001:8000"]          # api reaches it in-network at http://vllm:8000/v1
    volumes: [vllm-cache:/root/.cache/huggingface]
    # GPU host: uncomment to schedule on CUDA
    # deploy: { resources: { reservations: { devices: [{ capabilities: ["gpu"] }] } } }

volumes: { argus-data: {}, pg-data: {}, neo4j-data: {}, ollama-data: {}, vllm-cache: {} }
