# Prod overrides — full fidelity, auth on, autoscaled, secrets from argus-secrets.
replicaCount: 3
image:
  pullPolicy: IfNotPresent
env:
  ARGUS_FAST: "0"
  ARGUS_DB: /data/copilot.db
  ARGUS_CORS_ORIGINS: "https://argus.internal"
  ARGUS_AUTH_ENABLED: "1"
secret:
  name: argus-secrets            # DATABASE_URL, ARGUS_JWT_SECRET, OIDC_JWKS_URL, HF token
resources:
  requests: { cpu: "1", memory: 2Gi }
  limits:   { cpu: "4", memory: 8Gi }
persistence:
  enabled: true
  size: 20Gi
ingress:
  enabled: true
  className: nginx
  host: argus.internal
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 70
cronjobs:
  pipeline: { enabled: true }
  retrain: { enabled: true }
llm:
  enabled: true
  url: "http://vllm:8000/v1"
  model: "Qwen2.5-1.5B-Instruct"
