<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ARGUS — Strategic Intelligence Copilot</title>
<style>
:root{--navy:#1f4e79;--navy2:#0b2b4c;--red:#c00000;--bg:#0f1722;--panel:#16202e;--ink:#e8eef5;--mut:#8aa0b8;--acc:#4da3ff}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column}
header{background:linear-gradient(135deg,var(--navy2),var(--navy));padding:12px 22px;display:flex;align-items:center;gap:14px}
header h1{font-size:16px;margin:0;letter-spacing:.6px}header span{font-size:11px;color:#bcd2e8}
.banner{background:var(--red);color:#fff;text-align:center;font-size:10.5px;padding:2px;letter-spacing:1px}
main{flex:1;display:flex;overflow:hidden}
#chat{flex:1;display:flex;flex-direction:column;max-width:880px;margin:0 auto;width:100%}
#log{flex:1;overflow-y:auto;padding:18px 16px}
.msg{margin:10px 0;display:flex}.msg.user{justify-content:flex-end}
.bubble{max-width:78%;padding:11px 14px;border-radius:12px;font-size:13.5px;line-height:1.5;white-space:pre-wrap}
.user .bubble{background:var(--navy);border-bottom-right-radius:3px}
.bot .bubble{background:var(--panel);border:1px solid #243246;border-bottom-left-radius:3px}
.bubble b,.bubble strong{color:#fff}.bubble code{background:#0c1420;padding:1px 5px;border-radius:4px;font-size:11px;color:var(--acc)}
.meta{font-size:10px;color:var(--mut);margin-top:5px}
.calbadge{font-size:10px;color:#8fe3ae;margin-top:4px}
.chip{display:inline-block;font-size:10px;padding:1px 8px;border-radius:9px;margin-left:6px;vertical-align:1px}
.chip.SENSITIVE{background:#5a3c10;color:#ffd28a}.chip.ROBUST{background:#143c22;color:#8fe3ae}.chip.FRAGILE{background:#4a1212;color:#ff9d9d}
.fcs{margin-top:8px}.fc{background:#0c1420;border:1px solid #233246;border-radius:9px;padding:8px 10px;margin:6px 0;font-size:12.5px}
.bar{height:9px;background:#223145;border-radius:5px;margin-top:6px;position:relative;overflow:visible}
.fill{height:100%;background:var(--acc);border-radius:5px}.band{position:absolute;top:2px;height:5px;background:var(--red);border-radius:3px;opacity:.9}
#composer{display:flex;gap:8px;padding:12px 16px 6px}
#q{flex:1;background:var(--panel);border:1px solid #2a3a52;border-radius:10px;color:var(--ink);padding:11px 13px;font-size:14px;outline:none}
#q:focus{border-color:var(--acc)}button{background:var(--navy);border:none;color:#fff;border-radius:10px;padding:0 18px;font-size:14px;cursor:pointer}
button:hover{background:#28639a}
#sugs{display:flex;flex-wrap:wrap;gap:6px;padding:4px 16px 14px}
#sugs button{background:#16202e;border:1px solid #2a3a52;color:var(--mut);font-size:11px;padding:5px 10px;border-radius:14px}
#sugs button:hover{color:var(--ink);border-color:var(--acc)}
a{color:var(--acc)}
.typing{color:var(--mut);font-size:12px;padding:0 16px}
</style>
</head>
<body>
<div class="banner">OPEN-SOURCE ANALYTIC EXERCISE — MODEL-CONDITIONED PROBABILITIES WITH ROBUST BANDS — NOT AN OFFICIAL INTELLIGENCE PRODUCT</div>
<header>
  <h1>ARGUS COPILOT</h1>
  <span id="status">connecting…</span>
  <span style="margin-left:auto">persona:
    <select id="persona" style="background:#16202e;color:#e8eef5;border:1px solid #2a3a52;border-radius:6px;padding:2px 6px">
      <option value="analyst">analyst</option><option value="principal">principal</option>
      <option value="planner">planner</option><option value="watch">watch officer</option>
    </select></span>
</header>
<main><div id="chat">
  <div id="log"></div>
  <div class="typing" id="typing" style="display:none">engines running…</div>
  <div id="composer">
    <input id="q" placeholder="Ask: forecasts, why, what-if, policy, early warnings, analogs, scenarios…" autocomplete="off">
    <button onclick="send()">Ask</button>
  </div>
  <div id="sugs"></div>
</div></main>
<script>
const SUGS=[
 "What is likely to happen in the Middle East?",
 "Why is war re-ignition risk so high?",
 "What if we deploy a Gulf maritime verification coalition?",
 "Which policy portfolio best reduces risk with budget 8?",
 "What are the early warning signs?",
 "Which regions are most vulnerable?",
 "What historical events are most similar to the Hormuz crisis?",
 "Show me the scenarios",
 "Will Democrats take the House?",
 "What's the chance of a global recession?"];
let SID=null,CAL=null;
fetch("/v1/calibration").then(r=>r.json()).then(j=>{CAL=j}).catch(()=>{});
function calBadge(p){ // Task 61: track-record badge from reliability bins
 if(!CAL||!CAL.n_scored||!CAL.reliability_bins)return "";
 const bin=CAL.reliability_bins.find(b=>{const[lo,hi]=b.bin.split("-").map(Number);
  return p>=lo&&(p<hi||(hi===1&&p===1));});
 if(!bin)return "";
 if(bin.n<10)return `<div class="calbadge">track record: insufficient data at this level (n=${bin.n})</div>`;
 return `<div class="calbadge">forecasts near ${(bin.avg_p*100).toFixed(0)}% verified ${(bin.freq*100).toFixed(0)}% of the time (n=${bin.n})</div>`}
const log=document.getElementById("log"),typing=document.getElementById("typing");
const md=t=>t.replace(/&/g,"&amp;").replace(/</g,"&lt;")
 .replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/\*(.+?)\*/g,"<i>$1</i>")
 .replace(/`([^`]+)`/g,"<code>$1</code>").replace(/^- /gm,"• ").replace(/^(\d+)\. /gm,"$1. ");
function add(role,html,meta){const d=document.createElement("div");d.className="msg "+role;
 d.innerHTML=`<div class="bubble">${html}${meta?`<div class="meta">${meta}</div>`:""}</div>`;
 log.appendChild(d);log.scrollTop=log.scrollHeight;return d}
function fcCard(f){const p=f.probability*100,b=f.band;
 const band=b?`<div class="band" style="left:${b.lo*100}%;width:${Math.max(1,(b.hi-b.lo)*100)}%"></div>`:"";
 const chip=f.verdict?`<span class="chip ${f.verdict}">${f.verdict}</span>`:"";
 const bs=b?` <span style="color:#8aa0b8">[${(b.lo*100).toFixed(0)}–${(b.hi*100).toFixed(0)}]</span>`:"";
 return `<div class="fc">${f.question_text}${chip}<br><b>${p.toFixed(0)}%</b>${bs}
 <div class="bar"><div class="fill" style="width:${p}%"></div>${band}</div>${calBadge(f.probability)}</div>`}
async function send(txt){const q=document.getElementById("q");const text=txt||q.value.trim();if(!text)return;
 q.value="";add("user",md(text));typing.style.display="block";
 try{
  const r=await fetch("/v1/ask",{method:"POST",headers:{"Content-Type":"application/json"},
   body:JSON.stringify({text,persona:document.getElementById("persona").value,session_id:SID})});
  const j=await r.json();SID=j.session_id;
  let html=md(j.answer_markdown);
  if(j.forecasts&&j.forecasts.length)html+=`<div class="fcs">${j.forecasts.map(fcCard).join("")}</div>`;
  add("bot",html,`intent ${j.intent} · ${j.latency_ms} ms${j.abstained?" · abstained":""}${j.manifest_id?` · <a href="/v1/audit/${j.manifest_id}" target="_blank">audit</a>`:""}`);
 }catch(e){add("bot","engine error: "+e)}
 typing.style.display="none"}
document.getElementById("q").addEventListener("keydown",e=>{if(e.key==="Enter")send()});
const sugs=document.getElementById("sugs");SUGS.forEach(s=>{const b=document.createElement("button");
 b.textContent=s;b.onclick=()=>send(s);sugs.appendChild(b)});
fetch("/readyz").then(r=>r.json()).then(j=>{document.getElementById("status").textContent=
 `ready · θ ${j.theta_hash} · ${j.n_paths_cached.toLocaleString()} cached paths · startup ${j.startup_s}s`;
 add("bot",md("**ARGUS Copilot online.** I answer from scored engines only — forecasts carry adversarial-conformal bands, counterfactuals run paired simulations, every answer links to a reproducible manifest. Try a suggestion below."))})
 .catch(()=>document.getElementById("status").textContent="engine offline");
</script>
</body>
</html>
